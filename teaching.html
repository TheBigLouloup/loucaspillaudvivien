  const el = document.getElementById('teaching-content');

    const resp = await fetch('data/teaching.md');
    let md = await resp.text();
    md = md.replace(/\(Stat\//g, '(old_site/Stat/');

  } catch (e) {
    el.innerHTML = '<p>Content could not be loaded.</p>';
  }
});
